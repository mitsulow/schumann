function weightedRandomTime(){
  const r=Math.random();
  if(r<0.05)return Math.floor(Math.random()*180);
  if(r<0.20)return 180+Math.floor(Math.random()*180);
  if(r<0.85)return 360+Math.floor(Math.random()*720);
  return 1080+Math.floor(Math.random()*360);
}

function generateAllMembers(){
  const m=[];
  PREF.forEach(p=>{const n=Math.max(1,Math.round(p.pop/150));for(let i=0;i<n;i++)m.push({lat:p.lat+(Math.random()-0.5)*0.6,lng:p.lng+(Math.random()-0.5)*0.6,phase:Math.random()*Math.PI*2,intensity:0.4+Math.random()*0.6,connectMinute:weightedRandomTime()});});
  OVERSEAS.forEach(p=>{const n=Math.max(1,Math.round(p.pop/10));for(let i=0;i<n;i++){let jm=weightedRandomTime()-(p.tz*60);if(jm<0)jm+=1440;if(jm>=1440)jm-=1440;m.push({lat:p.lat+(Math.random()-0.5)*1.5,lng:p.lng+(Math.random()-0.5)*1.5,phase:Math.random()*Math.PI*2,intensity:0.4+Math.random()*0.6,connectMinute:jm});}});
  m.sort((a,b)=>a.connectMinute-b.connectMinute);
  return m;
}

function ll2v(lat,lng,r){const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));}

// 簡易海岸線 (即表示用フォールバック。詳細データのロード完了後に置き換え)
const roughGroup=new THREE.Group();
const landMat=new THREE.MeshBasicMaterial({color:0x0c1e18,transparent:true,opacity:0.7,side:THREE.DoubleSide});
CL.forEach(poly=>{
  if(poly.length<3)return;
  const verts=poly.map(p=>ll2v(p[0],p[1],1.0015));
  const center=new THREE.Vector3();verts.forEach(v=>center.add(v));center.divideScalar(verts.length).normalize().multiplyScalar(1.0015);
  const pos=[];
  for(let i=0;i<verts.length;i++){const nx=verts[(i+1)%verts.length];pos.push(center.x,center.y,center.z,verts[i].x,verts[i].y,verts[i].z,nx.x,nx.y,nx.z);}
  const g=new THREE.BufferGeometry();g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));g.computeVertexNormals();
  roughGroup.add(new THREE.Mesh(g,landMat));
});
const cMat=new THREE.LineBasicMaterial({color:0x1a6b50,transparent:true,opacity:0.45});
CL.forEach(line=>{roughGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(line.map(p=>ll2v(p[0],p[1],1.003))),cMat));});
earth.add(roughGroup);

(async function loadDetailedCoast(){
  try{
    const res=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/land-110m.json');
    if(!res.ok)return;
    const topo=await res.json();
    await new Promise((ok,ng)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
      s.onload=ok;s.onerror=ng;document.head.appendChild(s);
    });
    const land=topojson.feature(topo,topo.objects.land);
    const detail=new THREE.Group();
    const dMat=new THREE.LineBasicMaterial({color:0x3fd692,transparent:true,opacity:0.8});
    land.features.forEach(f=>{
      const geom=f.geometry;
      const rings=geom.type==='Polygon'?geom.coordinates:geom.coordinates.flat();
      rings.forEach(ring=>{
        if(ring.length<3)return;
        const pts=ring.map(c=>ll2v(c[1],c[0],1.004));
        detail.add(new THREE.LineLoop(new THREE.BufferGeometry().setFromPoints(pts),dMat));
      });
    });
    earth.add(detail);
    earth.remove(roughGroup);
    roughGroup.traverse(c=>{if(c.geometry)c.geometry.dispose();});
  }catch(e){/* オフライン等で失敗したら簡易海岸線のまま */}
})();

// 大気グロー (MMM動画の青いリム光)
scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.07,64,64),new THREE.ShaderMaterial({
  vertexShader:`varying vec3 vN,vP;void main(){vN=normalize(normalMatrix*normal);vP=(modelViewMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vN,vP;void main(){float f=1.0-max(dot(vN,normalize(-vP)),0.0);f=pow(f,3.2);gl_FragColor=vec4(0.2,0.5,1.0,f*0.5);}`,
  transparent:true,side:THREE.FrontSide,depthWrite:false,
})));

// ═══ 雷ホタル (Blitzortung.org リアルタイム雷) ═══
// シューマン共振の源 = 世界中の雷。実際に今どこで雷が落ちているかが光る
const MAX_PTS=1500;
const STRIKE_LIFE=22.0; // 秒: 閃光→ホタルとして残光→消える
const fPos=new Float32Array(MAX_PTS*3),fSz=new Float32Array(MAX_PTS),fPh=new Float32Array(MAX_PTS),fIn=new Float32Array(MAX_PTS),fBorn=new Float32Array(MAX_PTS);
fBorn.fill(-99999);
const fG=new THREE.BufferGeometry();
fG.setAttribute('position',new THREE.BufferAttribute(fPos,3));
fG.setAttribute('aSize',new THREE.BufferAttribute(fSz,1));
fG.setAttribute('aPhase',new THREE.BufferAttribute(fPh,1));
fG.setAttribute('aInt',new THREE.BufferAttribute(fIn,1));
fG.setAttribute('aBorn',new THREE.BufferAttribute(fBorn,1));
fG.setDrawRange(0,MAX_PTS);

const ffMat=new THREE.ShaderMaterial({
  vertexShader:`attribute float aSize,aPhase,aInt,aBorn;varying float vPh,vIn,vBorn;uniform float uTime;
  void main(){vPh=aPhase;vIn=aInt;vBorn=aBorn;vec4 mv=modelViewMatrix*vec4(position,1.0);
  float age=uTime-aBorn;float flash=1.0+1.6*exp(-age*4.0);
  gl_PointSize=aSize*(80.0/-mv.z)*flash;gl_Position=projectionMatrix*mv;}`,
  fragmentShader:`uniform float uTime,uLife;varying float vPh,vIn,vBorn;
  void main(){float d=length(gl_PointCoord-0.5);if(d>0.5)discard;
  float age=uTime-vBorn;
  float ain=clamp(age/0.15,0.0,1.0);
  float aout=clamp(1.0-age/uLife,0.0,1.0);
  float flash=1.0+2.2*exp(-age*5.0);
  float pulse=sin(uTime*1.4+vPh)*0.25+0.75;
  float alpha=smoothstep(0.5,0.05,d);float core=smoothstep(0.22,0.0,d);
  float b=alpha*pulse*vIn*0.62*ain*aout*flash;
  if(b<0.004)discard;
  vec3 col=mix(vec3(0.55,0.68,0.95),vec3(1.0,1.0,1.0),core);
  gl_FragColor=vec4(col*b,b);}`,
  uniforms:{uTime:{value:0},uLife:{value:STRIKE_LIFE}},transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
});
earth.add(new THREE.Points(fG,ffMat));

let strikeIdx=0,strikesDirty=false;
function addStrike(lat,lon,t){
  const i=strikeIdx;strikeIdx=(strikeIdx+1)%MAX_PTS;
  const v=ll2v(lat,lon,1.015);
  fPos[i*3]=v.x;fPos[i*3+1]=v.y;fPos[i*3+2]=v.z;
  fSz[i]=1.6+Math.random()*1.9;
  fPh[i]=Math.random()*Math.PI*2;
  fIn[i]=0.55+Math.random()*0.45;
  fBorn[i]=t;
  strikesDirty=true;
}

// ── Blitzortung.org WebSocket (世界の雷ボランティア観測網) ──
function lzwDecode(data){
  const dict={};let currChar=data[0],oldPhrase=currChar;const out=[currChar];let code=256,phrase;
  for(let i=1;i<data.length;i++){
    const cc=data.charCodeAt(i);
    if(cc<256)phrase=data[i];
    else phrase=dict[cc]?dict[cc]:(oldPhrase+currChar);
    out.push(phrase);currChar=phrase[0];dict[code]=oldPhrase+currChar;code++;oldPhrase=phrase;
  }
  return out.join('');
}
const BO_HOSTS=['wss://ws1.blitzortung.org/','wss://ws7.blitzortung.org/','wss://ws8.blitzortung.org/','wss://ws3.blitzortung.org/'];
let boIdx=0,boGotData=false,boBudget=40,boRetryTimer=null;
function boConnect(){
  let ws;
  try{ws=new WebSocket(BO_HOSTS[boIdx%BO_HOSTS.length]);}catch(e){boRetry();return;}
  boIdx++;
  ws.onopen=()=>{try{ws.send(JSON.stringify({a:111}));}catch(e){}};
  ws.onmessage=ev=>{
    try{
      const j=JSON.parse(lzwDecode(String(ev.data)));
      const lat=j.lat!==undefined?j.lat:j.latitude;
      const lon=j.lon!==undefined?j.lon:j.longitude;
      if(typeof lat==='number'&&typeof lon==='number'){
        boGotData=true;
        if(boBudget>0){boBudget--;addStrike(lat,lon,clock.getElapsedTime());}
      }
    }catch(e){}
  };
  ws.onclose=()=>boRetry();
  ws.onerror=()=>{try{ws.close();}catch(e){}};
}
function boRetry(){clearTimeout(boRetryTimer);boRetryTimer=setTimeout(boConnect,3000);}
setInterval(()=>{boBudget=40;},1000); // 表示は最大 40発/秒に間引き
// フォールバック: 雷データが届かない間は熱帯収束帯を模した擬似雷で見た目を維持
setInterval(()=>{
  if(boGotData)return;
  const t=clock.getElapsedTime();
  for(let i=0;i<3;i++){
    const lat=Math.random()<0.72?(Math.random()*44-22):(Math.random()*110-55);
    const lon=Math.random()*360-180;
    addStrike(lat,lon,t);
  }
},650);
boConnect();

// ═══ 電離層グリッド共振 ═══
const IONO_R=1.08;

// 球面上に均等分布する点（フィボナッチ球） - 少なめで繊細に
function fibSphere(n,r){
  const pts=[],g=Math.PI*(3-Math.sqrt(5));
  for(let i=0;i<n;i++){const y=1-(i/(n-1))*2,rad=Math.sqrt(1-y*y),t=g*i;
    pts.push(new THREE.Vector3(Math.cos(t)*rad*r,y*r,Math.sin(t)*rad*r));}
  return pts;
}
const GP=fibSphere(80,IONO_R); // 80点で繊細なグリッド

// 近傍3点で三角形を構築（少なめに）
function buildTris(){
  const tris=[],used=new Set();
  for(let i=0;i<GP.length;i++){
    const d=[];
    for(let j=0;j<GP.length;j++){if(j!==i)d.push({j,d:GP[i].distanceToSquared(GP[j])});}
    d.sort((a,b)=>a.d-b.d);
    // 最近傍3点だけで三角形（密度を下げる）
    for(let a=0;a<Math.min(3,d.length);a++){
      for(let b=a+1;b<Math.min(4,d.length);b++){
        const key=[i,d[a].j,d[b].j].sort().join('-');
        if(!used.has(key)){used.add(key);tris.push([i,d[a].j,d[b].j]);}
      }
    }
  }
  return tris;
}
const TRIS=buildTris();

// 常設の電離層グリッド（辺のみ・非常に薄い）を球全体に
const permEdgeSet=new Set();
const permLinePos=[];
for(const tri of TRIS){
  [[tri[0],tri[1]],[tri[1],tri[2]],[tri[2],tri[0]]].forEach(e=>{
    const key=e[0]<e[1]?e[0]+'-'+e[1]:e[1]+'-'+e[0];
    if(!permEdgeSet.has(key)){permEdgeSet.add(key);
      permLinePos.push(GP[e[0]].x,GP[e[0]].y,GP[e[0]].z,GP[e[1]].x,GP[e[1]].y,GP[e[1]].z);
    }
  });
}
const permLineG=new THREE.BufferGeometry();
permLineG.setAttribute('position',new THREE.Float32BufferAttribute(permLinePos,3));
const permLineMat=new THREE.LineBasicMaterial({color:0x3a80ff,transparent:true,opacity:0.13,blending:THREE.AdditiveBlending,depthWrite:false});
const permGrid=new THREE.LineSegments(permLineG,permLineMat);
earth.add(permGrid);

// グリッド頂点の光るノード (MMM動画のシアンの輝点)
const nodeMat=new THREE.PointsMaterial({color:0x6ec8ff,size:0.032,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false,sizeAttenuation:true});
const nodePts=new THREE.Points(new THREE.BufferGeometry().setFromPoints(GP),nodeMat);
earth.add(nodePts);

// 共振パルス：球全体のグリッドが波のように光る
const gridWaves=[];

function spawnGridWave(time){
  const group=new THREE.Group();

  // 全三角形からランダムに30〜50%を選択（球全体に分布）
  const ratio=0.3+Math.random()*0.2;
  const selected=TRIS.filter(()=>Math.random()<ratio);
  if(selected.length<5)return;

  // エッジライン（繊細に）
  const edgeSet=new Set(),linePos=[];
  for(const tri of selected){
    [[tri[0],tri[1]],[tri[1],tri[2]],[tri[2],tri[0]]].forEach(e=>{
      const key=e[0]<e[1]?e[0]+'-'+e[1]:e[1]+'-'+e[0];
      if(!edgeSet.has(key)){edgeSet.add(key);
        linePos.push(GP[e[0]].x,GP[e[0]].y,GP[e[0]].z,GP[e[1]].x,GP[e[1]].y,GP[e[1]].z);
      }
    });
  }
  const lG=new THREE.BufferGeometry();
  lG.setAttribute('position',new THREE.Float32BufferAttribute(linePos,3));
  const lM=new THREE.LineBasicMaterial({color:0x60b0ff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
  group.add(new THREE.LineSegments(lG,lM));

  // 反射三角形（選ばれた中のさらに10〜20%が「反射」して光る面）
  const reflectRatio=0.1+Math.random()*0.1;
  const reflectTris=selected.filter(()=>Math.random()<reflectRatio);
  if(reflectTris.length>0){
    const fPos=[];
    for(const tri of reflectTris){
      const p0=GP[tri[0]],p1=GP[tri[1]],p2=GP[tri[2]];
      fPos.push(p0.x,p0.y,p0.z,p1.x,p1.y,p1.z,p2.x,p2.y,p2.z);
    }
    const fG=new THREE.BufferGeometry();
    fG.setAttribute('position',new THREE.Float32BufferAttribute(fPos,3));
    const fM=new THREE.MeshBasicMaterial({color:0x80d0ff,transparent:true,opacity:0,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false});
    group.add(new THREE.Mesh(fG,fM));
  }

  earth.add(group);
  gridWaves.push({group,birthTime:time,lifetime:2+Math.random()*1.5}); // 2〜3.5秒

  // 同時に存在するのは最大2つ (3秒間隔なので少し重なる)
  while(gridWaves.length>2){
    const old=gridWaves.shift();
    earth.remove(old.group);old.group.children.forEach(c=>{c.geometry.dispose();c.material.dispose();});
  }
}

function updateGridWaves(time){
  for(let i=gridWaves.length-1;i>=0;i--){
    const w=gridWaves[i];
    const age=time-w.birthTime;
    if(age>=w.lifetime){
      earth.remove(w.group);w.group.children.forEach(c=>{c.geometry.dispose();c.material.dispose();});
      gridWaves.splice(i,1);continue;
    }
    // フェードイン(0.8s) → 維持 → フェードアウト(1.2s)
    let o;
    if(age<0.8) o=age/0.8;
    else if(age>w.lifetime-1.2) o=(w.lifetime-age)/1.2;
    else o=1.0;
    o*=0.85+0.15*Math.sin(time*1.2+w.birthTime*2.0);

    w.group.children.forEach(c=>{
      if(c.isLineSegments) c.material.opacity=o*0.35; // しっかり見えるライン
      else if(c.isMesh) c.material.opacity=o*0.2; // 反射三角形もしっかり
    });
  }
}

// (星空は透明背景化に伴い廃止 — 白いページでは塵に見えるため)

// ═══ 流星 ═══
const meteors=[];
function rndDir(){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1);return new THREE.Vector3(Math.sin(p)*Math.cos(t),Math.sin(p)*Math.sin(t),Math.cos(p));}
function spawnMeteor(time){
  // カメラから見える背景空間を斜めに横切る光の筋
  const pos=rndDir().multiplyScalar(16+Math.random()*14);
  pos.z=-Math.abs(pos.z)*0.5-6; // 地球の奥側の空
  const vel=rndDir().multiplyScalar(18+Math.random()*14);
  const g=new THREE.BufferGeometry().setFromPoints([pos,pos]);
  const m=new THREE.LineBasicMaterial({color:0xcfe4ff,transparent:true,opacity:0,blending:THREE.AdditiveBlending,depthWrite:false});
  const line=new THREE.Line(g,m);
  scene.add(line);
  meteors.push({line,pos:pos.clone(),vel,birth:time,life:1.0+Math.random()*0.8});
}
function updateMeteors(t,dt){
  for(let i=meteors.length-1;i>=0;i--){
    const mt=meteors[i];const age=t-mt.birth;
    if(age>mt.life){
      scene.remove(mt.line);mt.line.geometry.dispose();mt.line.material.dispose();
      meteors.splice(i,1);continue;
    }
    mt.pos.addScaledVector(mt.vel,dt);
    const tail=mt.pos.clone().addScaledVector(mt.vel,-0.14);
    mt.line.geometry.setFromPoints([tail,mt.pos]);
    const k=age/mt.life;
    mt.line.material.opacity=0.85*Math.sin(Math.PI*Math.min(1,k)); // ふわっと現れて消える
  }
}

// ═══ 操作 ═══
let dragging=false,prevX=0,prevY=0,velX=0,velY=0,rotX=0.3,rotY=-2.55,targetZ=4.5,lastPinch=0;
earth.rotation.x=rotX;earth.rotation.y=rotY;
container.addEventListener('mousedown',e=>{dragging=true;prevX=e.clientX;prevY=e.clientY;velX=velY=0;});
container.addEventListener('mousemove',e=>{if(!dragging)return;velY=(e.clientX-prevX)*0.005;velX=(e.clientY-prevY)*0.003;rotY+=velY;rotX+=velX;rotX=Math.max(-1.2,Math.min(1.2,rotX));prevX=e.clientX;prevY=e.clientY;});
container.addEventListener('mouseup',()=>dragging=false);
container.addEventListener('mouseleave',()=>dragging=false);
// スマホ: 横ドラッグ=回転 / 縦スワイプ=親ページのスクロールに渡す / 2本指=ズーム
let touchLock=null,touchStartX=0,touchStartY=0;
container.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    touchLock=null;dragging=false;
    touchStartX=prevX=e.touches[0].clientX;touchStartY=prevY=e.touches[0].clientY;
    velX=velY=0;
  }else if(e.touches.length===2){
    e.preventDefault();
    touchLock='pinch';dragging=false;
    const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;
    lastPinch=Math.sqrt(dx*dx+dy*dy);
  }
},{passive:false});
container.addEventListener('touchmove',e=>{
  if(e.touches.length===2||touchLock==='pinch'){
    e.preventDefault();
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY,dist=Math.sqrt(dx*dx+dy*dy);
      if(lastPinch>0){targetZ+=(lastPinch-dist)*0.02;targetZ=Math.max(1.8,Math.min(10,targetZ));}
      lastPinch=dist;
    }
    return;
  }
  const tx=e.touches[0].clientX,ty=e.touches[0].clientY;
  if(touchLock===null){
    const adx=Math.abs(tx-touchStartX),ady=Math.abs(ty-touchStartY);
    if(adx>7||ady>7){
      touchLock=adx>ady?'rotate':'scroll';
      if(touchLock==='rotate'){dragging=true;prevX=tx;prevY=ty;}
    }
    if(touchLock!=='rotate')return;
  }
  if(touchLock==='scroll')return; // 縦: ブラウザに任せて親ページをスクロール
  e.preventDefault();
  velY=(tx-prevX)*0.005;velX=(ty-prevY)*0.003;
  rotY+=velY;rotX+=velX;rotX=Math.max(-1.2,Math.min(1.2,rotX));
  prevX=tx;prevY=ty;
},{passive:false});
container.addEventListener('touchend',e=>{
  if(e.touches.length===0){dragging=false;lastPinch=0;touchLock=null;}
},{passive:false});
container.addEventListener('wheel',e=>{e.preventDefault();targetZ+=e.deltaY*0.003;targetZ=Math.max(1.8,Math.min(10,targetZ));},{passive:false});

// ═══ アニメーション ═══
const clock=new THREE.Clock();
const AUTO_SPIN=0.07; // rad/s 自転方向 (西→東)。指で回しても手を離すとこの回転に戻る
const GRID_INTERVAL=3;   // 約3秒ごとにグリッド共振
const GRID_FIRST_DELAY=2;
let lastGridTime=0;
let nextMeteorAt=5+Math.random()*7;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta(),t=clock.getElapsedTime();
  ffMat.uniforms.uTime.value=t;

  // 雷バッファの更新をまとめて反映
  if(strikesDirty){
    ['position','aSize','aPhase','aInt','aBorn'].forEach(n=>{fG.getAttribute(n).needsUpdate=true;});
    strikesDirty=false;
  }

  // グリッド共振 (約3秒ごと)
  if(t>GRID_FIRST_DELAY && t-lastGridTime>GRID_INTERVAL){
    spawnGridWave(t);
    lastGridTime=t;
  }
  updateGridWaves(t);

  // 流星 (6〜20秒に1回)
  if(t>nextMeteorAt){spawnMeteor(t);nextMeteorAt=t+6+Math.random()*14;}
  updateMeteors(t,dt);

  // ノードの明滅
  nodeMat.opacity=0.45+0.3*(0.5+0.5*Math.sin(t*1.3));

  if(!dragging){velX*=0.94;velY*=0.94;rotY+=velY;rotX+=velX;rotY+=AUTO_SPIN*dt;}
  earth.rotation.y+=(rotY-earth.rotation.y)*0.1;
  earth.rotation.x+=(rotX-earth.rotation.x)*0.1;
  camera.position.z+=(targetZ-camera.position.z)*0.08;
  renderer.render(scene,camera);
}
animate();
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

</script>
